<!DOCTYPE html>
<html>
<head>
  <title>Icon Generator</title>
</head>
<body>
  <canvas id="canvas" width="512" height="512"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function drawIcon(size) {
      canvas.width = size;
      canvas.height = size;

      // Background
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, size, size);

      // Dumbbell
      ctx.fillStyle = '#ffffff';
      const centerX = size / 2;
      const centerY = size / 2;
      const scale = size / 512;

      // Plates
      const plateWidth = 80 * scale;
      const plateHeight = 80 * scale;
      const barLength = 200 * scale;
      const barHeight = 16 * scale;

      ctx.fillRect(centerX - 180 * scale, centerY - 40 * scale, plateWidth, plateHeight);
      ctx.fillRect(centerX + 100 * scale, centerY - 40 * scale, plateWidth, plateHeight);

      // Bar
      ctx.fillRect(centerX - 100 * scale, centerY - 8 * scale, barLength, barHeight);

      // Center knurling
      ctx.fillStyle = '#666666';
      ctx.fillRect(centerX - 4 * scale, centerY - 12 * scale, 8 * scale, 24 * scale);

      return canvas.toDataURL('image/png');
    }

    // Generate 192x192
    const icon192 = drawIcon(192);
    const link192 = document.createElement('a');
    link192.download = 'icon-192.png';
    link192.href = icon192;
    link192.textContent = 'Download 192x192';
    document.body.appendChild(link192);
    document.body.appendChild(document.createElement('br'));

    // Generate 512x512
    const icon512 = drawIcon(512);
    const link512 = document.createElement('a');
    link512.download = 'icon-512.png';
    link512.href = icon512;
    link512.textContent = 'Download 512x512';
    document.body.appendChild(link512);
  </script>
</body>
</html>
